name: Build Windows Installer

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write   # necesario para crear GitHub Releases

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Instalar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Instalar dependencias
        run: npm install

      - name: Recompilar better-sqlite3 para Electron
        run: npx @electron/rebuild -f -w better-sqlite3
        env:
          npm_config_msvs_version: '2022'

      - name: Build Vite (frontend)
        run: npx vite build
        env:
          VITE_OPENAI_KEY: ${{ secrets.VITE_OPENAI_KEY }}

      - name: Package Electron (Windows .exe)
        run: npx electron-builder --win --x64 --config.npmRebuild=false --publish never

      - name: Listar archivos generados
        if: always()
        run: |
          echo "=== dist-electron contents ==="
          dir dist-electron /s /b 2>nul || echo "dist-electron not found"
        shell: cmd

      - name: Publicar Release en GitHub
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          name: "Gestión Proveedores ${{ github.ref_name }}"
          body: |
            ## 📦 Instalador Windows

            1. Descargá el archivo `.exe`
            2. Doble clic para instalar
            3. Abrí la app → **⚙️ Configuración** → ingresá tu OpenAI API key

            **Requisitos:** Windows 10 o superior (64 bits)
          files: dist-electron/**/*.exe
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
