name: Build Windows Installer

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Instalar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Instalar dependencias
        run: npm install

      - name: Recompilar better-sqlite3 para Electron (Windows x64)
        run: npx @electron/rebuild -f -w better-sqlite3
        env:
          npm_config_msvs_version: '2022'

      - name: Build Vite (frontend)
        run: npx vite build
        env:
          VITE_OPENAI_KEY: ${{ secrets.VITE_OPENAI_KEY }}

      - name: Package Electron — Windows .exe (NSIS)
        run: npx electron-builder --win --x64 --config.npmRebuild=false --publish never

      - name: Listar archivos generados
        if: always()
        run: dir dist-electron /s /b 2>nul || echo "dist-electron not found"
        shell: cmd

      - name: Publicar Release en GitHub
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          name: "Gestión Proveedores ${{ github.ref_name }}"
          body: |
            ## 📦 Gestión de Proveedores ${{ github.ref_name }}

            ### Instalación
            1. Descargá el archivo `.exe`
            2. Doble clic → seguí el asistente de instalación
            3. Al abrir la app ingresá tu clave de licencia

            ### Novedades de esta versión
            - 🔎 **Auditoría de Precios** — nueva función en Lista de Compra: filtrá por categoría (ej: "Carnes"), agregá todos de un rubro con un click y exportá un PDF tipo reporte ejecutivo
            - 📄 **PDF mejorado** — resumen con ahorro potencial, distribución por categoría, tabla de mejor proveedor + alternativas, y pedidos listos por proveedor
            - 💾 **Backup / Restore** de base de datos en Configuración
            - 📊 **Alertas de precio automáticas** en el Dashboard (subidas >10%)
            - 🤖 **Equivalencias IA más robusta** — fix del error de productos duplicados
            - 🛡️ **Error Boundary global** — pantallas con error muestran mensaje amigable
            - 🔍 **Búsqueda múltiple** en Comparador — pegá una lista de productos (uno por línea)

            ### Requisitos
            - Windows 10 o superior (64 bits)
            - Sin conexión a internet obligatoria — todos los datos son locales
          files: |
            dist-electron/**/*.exe
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
