name: Build Windows Installer

on:
  push:
    tags:
      - 'v*'          # Solo cuando hacés git tag v1.0.1 y push
  workflow_dispatch:  # También podés correrlo manualmente

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Instalar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Instalar dependencias
        run: npm install

      - name: Build Vite (frontend)
        run: npx vite build
        env:
          VITE_OPENAI_KEY: ${{ secrets.VITE_OPENAI_KEY }}

      - name: Package Electron (Windows .exe)
        run: npx electron-builder --win --x64
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publicar Release en GitHub
        uses: softprops/action-gh-release@v2
        with:
          name: "Gestión Proveedores ${{ github.ref_name }}"
          body: |
            ## Instalador Windows

            Descargá el archivo `.exe` e instalalo con doble clic.
            No requiere configuración adicional.

            **Requiere:** Windows 10 o superior (64 bits)
          files: |
            dist-electron/**/*.exe
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
