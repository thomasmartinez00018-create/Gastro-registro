name: Build Windows Installer

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Instalar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Instalar dependencias
        run: npm install

      - name: Recompilar better-sqlite3 para Electron (Windows x64)
        run: npx @electron/rebuild -f -w better-sqlite3
        env:
          npm_config_msvs_version: '2022'

      - name: Build Vite (frontend)
        run: npx vite build
        env:
          VITE_OPENAI_KEY: ${{ secrets.VITE_OPENAI_KEY }}

      - name: Package Electron — Windows .exe (NSIS)
        run: npx electron-builder --win --x64 --config.npmRebuild=false --publish never

      - name: Listar archivos generados
        if: always()
        run: dir dist-electron /s /b 2>nul || echo "dist-electron not found"
        shell: cmd

      - name: Publicar Release en GitHub
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          name: "Gestión Proveedores ${{ github.ref_name }}"
          body: |
            ## 📦 Gestión de Proveedores ${{ github.ref_name }}

            ### Instalación
            1. Descargá el archivo `.exe`
            2. Doble clic → seguí el asistente de instalación
            3. Al abrir la app ingresá tu clave de licencia

            ### Novedades de esta versión
            - 📊 **Import Excel mejorado** — vista previa de las filas reales del Excel en el paso de mapeo de columnas
            - 🔎 **Ejemplos por columna** — al seleccionar una columna se muestran valores de ejemplo para confirmar que elegiste la correcta
            - ⚠️ **Guía clara de campos obligatorios** — aviso inline que indica exactamente qué campo falta mapear cuando el botón está deshabilitado
            - 📱 **Pedido por WhatsApp** — genera el mensaje y abre WhatsApp directo al proveedor con prefijo +549
            - 📋 **Historial de pedidos** — cada pedido queda guardado con estado Enviado / Recibido / Cancelado
            - 🛒 **Armar lista desde selección** — productos seleccionados en el comparador pasan a Lista de compra con un click
            - 📷 **Lector de código de barras** — escaneás y los productos se agregan automáticamente
            - 🏷️ **Código de barras en productos** — campo EAN/UPC buscable en toda la app
            - 🔤 **Tamaño de texto ajustable** — Chica / Normal / Grande en Configuración
            - 🔑 **IA integrada** — clave OpenAI embebida, no requiere configuración
            - 💾 **Backup / Restore** de base de datos en Configuración

            ### Requisitos
            - Windows 10 o superior (64 bits)
            - Sin conexión a internet obligatoria — todos los datos son locales
          files: |
            dist-electron/**/*.exe
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
